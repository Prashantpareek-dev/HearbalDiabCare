<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Herbal Diab Care</title>
  <style>
    :root {
      --green: #1f8f3a;
      --light-green: #3ad364;
      --bg-dark: #060a07;
      --text: #e9f7ed;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(58, 211, 100, 0.18) 0%, transparent 36%),
        radial-gradient(circle at 80% 12%, rgba(31, 143, 58, 0.2) 0%, transparent 40%),
        linear-gradient(145deg, #040604 0%, #08110a 45%, #060a07 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    .celebration-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .cracker {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(77, 255, 132, 0.35) 0%, rgba(77, 255, 132, 0.08) 30%, transparent 66%);
      filter: blur(1px);
      animation: crackPulse 2.2s ease-in-out infinite;
    }

    .cracker.left {
      top: 10%;
      left: -30px;
      animation-delay: 0.2s;
    }

    .cracker.right {
      top: 8%;
      right: -30px;
      animation-delay: 1.1s;
    }

    @keyframes crackPulse {
      0%,
      100% {
        transform: scale(0.6);
        opacity: 0.2;
      }

      50% {
        transform: scale(1.15);
        opacity: 0.9;
      }
    }

    .shower-piece {
      position: absolute;
      top: -14px;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      opacity: 0.9;
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-12px) rotate(0deg);
        opacity: 0;
      }

      12% {
        opacity: 1;
      }

      100% {
        transform: translateY(110vh) rotate(680deg);
        opacity: 0.1;
      }
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(165deg, rgba(11, 22, 14, 0.96), rgba(8, 14, 10, 0.96));
      border: 1px solid rgba(58, 211, 100, 0.35);
      border-radius: 20px;
      padding: clamp(22px, 5vw, 36px);
      text-align: center;
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(58, 211, 100, 0.09) inset;
      position: relative;
      z-index: 3;
      backdrop-filter: blur(2px);
    }

    .badge {
      display: inline-block;
      background: rgba(58, 211, 100, 0.16);
      color: #9cffb8;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 8px 14px;
      border-radius: 999px;
      margin-bottom: 14px;
      text-transform: uppercase;
      border: 1px solid rgba(58, 211, 100, 0.5);
    }

    .title {
      font-size: clamp(28px, 7vw, 40px);
      color: #84ffab;
      margin-bottom: 12px;
      font-weight: 800;
      text-shadow: 0 0 22px rgba(76, 245, 124, 0.45);
    }

    .hero-img {
      width: clamp(140px, 40vw, 240px);
      height: auto;
      object-fit: contain;
      margin: 4px auto 14px;
      display: block;
    }

    .line {
      font-size: clamp(15px, 4vw, 19px);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .line strong {
      color: #84ffab;
    }

    .meta {
      margin-top: 14px;
      background: rgba(58, 211, 100, 0.1);
      border: 1px solid rgba(58, 211, 100, 0.35);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      color: #dcffe6;
    }

    .cta {
      margin-top: 18px;
      display: inline-block;
      text-decoration: none;
      background: var(--light-green);
      color: #fff;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 10px;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .cta:hover {
      background: var(--green);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="badge">Order Confirmed</div>
    <h1 class="title">Thank You!</h1>
    <img class="hero-img" src="./Image/Product.avif" alt="Herbal Diab Care Product">
    <p class="line">Hi <strong id="nameValue">Customer</strong>, your order has been received successfully.</p>
    <p class="line">Our team will contact you shortly for confirmation.</p>
    <div class="meta">Selected Course: <strong id="courseValue">1 Month Course</strong></div>
    <!-- <a class="cta" href="index.html#order">Back To Order Form</a> -->
  </div>

  <div class="celebration-layer" id="celebrationLayer">
    <div class="cracker left"></div>
    <div class="cracker right"></div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const name = (params.get('name') || '').trim();
      const course = (params.get('course') || '').trim();
      if (name) document.getElementById('nameValue').textContent = name;
      if (course) document.getElementById('courseValue').textContent = course;

      const colors = ['#7dff9f', '#39d35f', '#f5ff7b', '#ffffff', '#5cff8c'];
      const layer = document.getElementById('celebrationLayer');
      for (let i = 0; i < 70; i++) {
        const p = document.createElement('span');
        p.className = 'shower-piece';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDuration = (3.2 + Math.random() * 3.6) + 's';
        p.style.animationDelay = (Math.random() * 3.4) + 's';
        p.style.width = (5 + Math.random() * 6) + 'px';
        p.style.height = (8 + Math.random() * 14) + 'px';
        layer.appendChild(p);
      }
    })();
  </script>
</body>

</html>
